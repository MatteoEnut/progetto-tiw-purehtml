<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
</head>
<body>

	<h2 th:text="'Playlist: ' + ${playlist.title}"></h2>

	<table>
		<thead>
			<tr>
				<th>Title</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="song : ${songs}">
				<td th:text="${song.title}"></td>
			</tr>
		</tbody>
	</table>
</body>
</html>
