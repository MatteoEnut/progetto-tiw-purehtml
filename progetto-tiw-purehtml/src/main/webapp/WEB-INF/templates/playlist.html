<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Playlist: ' + ${playlist.title}"></title>
    <style>
        .song-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .song-card {
            width: 180px;
            margin: 0 10px;
            text-align: center;
        }
        .song-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h2 th:text="'Playlist: ' + ${playlist.title}"></h2>

    <div class="nav-buttons">
        <div th:if="${hasPrevious}">
            <form method="get" th:action="@{/Playlist}">
                <input type="hidden" name="id" th:value="${playlist.id}" />
                <input type="hidden" name="page" th:value="${page - 1}" />
                <button type="submit">PRECEDENTI</button>
            </form>
        </div>
        <div th:if="${hasNext}">
            <form method="get" th:action="@{/Playlist}">
                <input type="hidden" name="id" th:value="${playlist.id}" />
                <input type="hidden" name="page" th:value="${page + 1}" />
                <button type="submit">SUCCESSIVI</button>
            </form>
        </div>
    </div>

    <div class="song-row">
        <div class="song-card" th:each="song : ${songs}">
            <a th:href="@{'/Player?id=' + ${song.id}}">
                <div>
                    <img th:src="@{'/GetSongMedia?id=' + ${song.id} + '&type=image'}" alt="Cover"/>
                </div>
                <p th:text="${song.title}"></p>
            </a>
        </div>
    </div>

    <hr/>

    <h3>Add songs to this playlist</h3>

    <form th:action="@{/AddSongsToPlaylist}" method="post">
        <input type="hidden" name="playlistId" th:value="${playlist.id}" />

        <div th:if="${#lists.isEmpty(availableSongs)}">
            <p>No available songs to add.</p>
        </div>
        <div th:if="${!#lists.isEmpty(availableSongs)}">
            <ul>
                <li th:each="song : ${availableSongs}">
                    <label>
                        <input type="checkbox" name="songIds" th:value="${song.id}" />
                        <span th:text="${song.title + ' - ' + song.artist}"></span>
                    </label>
                </li>
            </ul>
        </div>

        <button type="submit">Add Selected Songs</button>
    </form>

</body>
</html>
